# Overlay on:
# zephyr/samples/bluetooth/hci_ipc/nrf5340_cpunet_iso-bt_ll_sw_split.conf
#
# Goal for GroupTalk netcore (broadcaster role):
# - support both GroupTalk roles (broadcaster + uplink receiver)
# - keep only BIS broadcast/sync roles (no connected ISO roles)
# - free controller memory headroom for higher ISO stream counts

# Enable GRPTLK also in the netcore
CONFIG_GRPTLK=y

# Keep both BIS directions available for broadcaster + uplink RX use.
CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_PER_ADV=y
CONFIG_BT_ISO_BROADCASTER=y
CONFIG_BT_ISO_SYNC_RECEIVER=y

# Only keep roles/features required by GroupTalk BIS traffic in both roles.
CONFIG_BT_CENTRAL=n
CONFIG_BT_PERIPHERAL=n
CONFIG_BT_ISO_CENTRAL=n
CONFIG_BT_ISO_PERIPHERAL=n
CONFIG_BT_CTLR_CENTRAL_ISO=n
CONFIG_BT_CTLR_PERIPHERAL_ISO=n
CONFIG_BT_PER_ADV_SYNC_TRANSFER_SENDER=n
CONFIG_BT_PER_ADV_SYNC_TRANSFER_RECEIVER=n
CONFIG_BT_CTLR_SYNC_TRANSFER_SENDER=n
CONFIG_BT_CTLR_SYNC_TRANSFER_RECEIVER=n
CONFIG_BT_CTLR_DTM_HCI=n
# PHY capability:
# - 1M PHY is mandatory in LE controller (always available)
# - keep both optional PHYs enabled for GroupTalk flexibility
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_CTLR_PHY_CODED=y
CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=n
CONFIG_BT_CTLR_ADVANCED_FEATURES=n
CONFIG_BT_CTLR_ADV_SET=1
CONFIG_BT_CTLR_ADV_AUX_SET=1
CONFIG_BT_CTLR_ADV_SYNC_SET=1
CONFIG_BT_CTLR_SCAN_AUX_SET=1
CONFIG_BT_CTLR_ADV_DATA_BUF_MAX=2

# Advertisement and Scan Data Lengths
CONFIG_BT_CTLR_ADV_DATA_LEN_MAX=191
CONFIG_BT_CTLR_SCAN_DATA_LEN_MAX=255

# ISO Settings
CONFIG_BT_CTLR_ADV_ISO=y
CONFIG_BT_CTLR_ADV_ISO_INTERLEAVED=n
# Keep headroom for future SDU size growth without a netcore rebuild.
CONFIG_BT_CTLR_ADV_ISO_PDU_LEN_MAX=247

CONFIG_BT_CTLR_SYNC_ISO=y
CONFIG_BT_CTLR_SYNC_ISO_INTERLEAVED=n
# NOTE:
# With hci_ipc (BT_HCI_RAW), Zephyr constrains this to 251, so this cannot
# currently be reduced below 251 even if runtime payloads are smaller.
CONFIG_BT_CTLR_SYNC_ISO_PDU_LEN_MAX=251

# NOTE:
# Fallback stream/channel limits for shared netcore.conf use.
# In nRF53 iso_broadcast sysbuild builds, these values are overridden from
# SB_CONFIG_GRPTLK_MAX_ISO_CHAN_COUNT in samples/iso_broadcast/sysbuild.cmake.
CONFIG_BT_CTLR_ADV_ISO_STREAM_MAX=5
CONFIG_BT_CTLR_ADV_ISO_STREAM_COUNT=5
# Broadcaster receives on MAX-1 uplink BISes (BIS2..BISn).
CONFIG_BT_CTLR_SYNC_ISO_STREAM_MAX=4
CONFIG_BT_CTLR_SYNC_ISO_STREAM_COUNT=4
CONFIG_BT_CTLR_ISOAL_SOURCES=5
CONFIG_BT_CTLR_ISOAL_SINKS=4
CONFIG_BT_ISO_MAX_CHAN=5

# 40-byte SDU + max 8-byte HCI ISO data header overhead
CONFIG_BT_CTLR_ISO_TX_BUFFER_SIZE=48
CONFIG_BT_CTLR_ISO_TX_SDU_LEN_MAX=40

# Keep default hci_ipc heap and tune ISO HCI raw buffer footprint.
CONFIG_HEAP_MEM_POOL_SIZE=4096
# Runtime payload length matches configured TX MTU.
CONFIG_BT_ISO_TX_MTU=40
CONFIG_BT_ISO_RX_MTU=40
CONFIG_BT_ISO_TX_BUF_COUNT=8
CONFIG_BT_ISO_RX_BUF_COUNT=8
CONFIG_BT_BUF_EVT_RX_COUNT=16

# Controller queueing tuned for continuous GroupTalk ISO traffic.
CONFIG_BT_CTLR_RX_BUFFERS=9
CONFIG_BT_CTLR_ISO_TX_BUFFERS=8
CONFIG_BT_CTLR_ISO_RX_BUFFERS=8
