# ISO Settings mapped to the basic limits of nrf5340dk
CONFIG_BT_ISO_MAX_CHAN=5
CONFIG_BT_ISO_TX_BUF_COUNT=8

# Enable 128 MHz HFCLK for LC3 encode/decode budget 
CONFIG_NRFX_CLOCK=y

# Relay mode uses 2 broadcast source streams (1 RX relayed to 1 TX BIS)
CONFIG_BT_BAP_BROADCAST_SRC_STREAM_COUNT=2

# Note: this board operates best in RELAY mode
