# Application config for CS47L63 backend
CONFIG_BT_ISO_MAX_CHAN=5
CONFIG_BT_ISO_TX_BUF_COUNT=8

CONFIG_SPI=y
CONFIG_HW_CODEC_CIRRUS_LOGIC=y

# Enable 128 MHz HFCLK for LC3 encode/decode budget (4x decode + encode in 10ms)
CONFIG_NRFX_CLOCK=y

# BIS layout: BIS1 = TX (mixed audio out), BIS2 = RX uplink from other devices
# NUM_RX_BIS = BT_BAP_BROADCAST_SRC_STREAM_COUNT - 1, so 2 gives exactly 1 RX slot
CONFIG_BT_BAP_BROADCAST_SRC_STREAM_COUNT=2
