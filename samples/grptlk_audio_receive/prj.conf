# GRPTLK
CONFIG_GRPTLK=y
CONFIG_GRPTLK_RECV=y

# System
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=4096

# Bluetooth
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_DEVICE_NAME="GRPTLK Receiver"
CONFIG_BT_RX_STACK_SIZE=4096

# Bluetooth Audio
CONFIG_BT_AUDIO=y

# Host features
CONFIG_BT_HCI=y
CONFIG_BT_HCI_VS=y

# ISO features
CONFIG_BT_ISO_BROADCASTER=y
CONFIG_BT_ISO_SYNC_RECEIVER=y
CONFIG_BT_ISO_TX_BUF_COUNT=8

# Logging
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_BT_ISO_LOG_LEVEL_DBG=y
CONFIG_LOG_BUFFER_SIZE=4096

# Set same ACL RX buffer size as in hci_ipc on netcore to support
# HCI Controller to Host Flow Control.
CONFIG_BT_BUF_ACL_RX_SIZE=255

# Add Ozone debugger support
CONFIG_DEBUG_THREAD_INFO=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

# LC3 (LC3Plus enabled for 5 ms frame duration support)
CONFIG_LIBLC3=y
CONFIG_LIBLC3_PLUS=y
CONFIG_FPU=y

# Common audio-related services
CONFIG_GPIO=y
CONFIG_NRFX_CLOCK=y

CONFIG_THREAD_NAME=y
